name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspace=frontend
      - run: npx tsc --noEmit --project frontend/tsconfig.json
      - run: npm test --workspace=frontend

  backend:
    name: Backend — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspace=backend
      - run: npx tsc --noEmit --project backend/tsconfig.json
      - run: npm test --workspace=backend

  contracts:
    name: Contracts — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - working-directory: contracts
        run: cargo fmt --check
      - working-directory: contracts
        run: cargo clippy -- -D warnings
      - working-directory: contracts
        run: cargo test

  zk:
    name: ZK Circuits — compile, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Noir
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - working-directory: zk/circuits
        run: nargo check
      - working-directory: zk/circuits
        run: nargo test
